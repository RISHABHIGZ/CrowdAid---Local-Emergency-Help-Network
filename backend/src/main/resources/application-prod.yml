# ── Production profile (Render + Render PostgreSQL) ──────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@crowdaid.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

crowdaid:
  emergency:
    search-radius-km: ${SEARCH_RADIUS_KM:10}
  cors:
    allowed-origins: ${CORS_ORIGINS:https://crowd-a2gztt2vq-shaw-workspace.vercel.app}

logging:
  level:
    com.crowdaid: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
